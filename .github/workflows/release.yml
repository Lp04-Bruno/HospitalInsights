name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/hospitalinsights_ci
      NEXTAUTH_SECRET: ci-build-secret
      NEXTAUTH_URL: http://localhost:3000
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Ensure tag points to master history
        working-directory: .
        run: |
          git fetch origin master
          git merge-base --is-ancestor "$GITHUB_SHA" origin/master

      - name: Use Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24.16.0
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Setup npm retry config
        run: |
          npm config set fetch-retries 5
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 120000

      - name: Install deps
        run: |
          npm ci --prefer-online --no-audit --no-fund || (
            sleep 5
            rm -rf node_modules
            npm cache verify
            npm ci --prefer-online --no-audit --no-fund
          )

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Prettier check
        run: npx --no-install prettier --ignore-path ../.prettierignore --check ..

      - name: Build
        run: npm run build

      - name: Create GitHub release
        working-directory: .
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes --latest
