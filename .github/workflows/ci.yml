name: CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["develop", "master"]
    types: ["opened", "synchronize", "reopened", "ready_for_review"]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v7

      - name: Use Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24.18.0
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Setup npm retry config
        run: |
          npm config set fetch-retries 5
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 120000

      - name: Install deps
        run: |
          npm ci --prefer-online --no-audit --no-fund || (
            sleep 5
            rm -rf node_modules
            npm cache verify
            npm ci --prefer-online --no-audit --no-fund
          )

      - name: Lint
        run: npm run lint

  typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v7

      - name: Use Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24.18.0
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Setup npm retry config
        run: |
          npm config set fetch-retries 5
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 120000

      - name: Install deps
        run: |
          npm ci --prefer-online --no-audit --no-fund || (
            sleep 5
            rm -rf node_modules
            npm cache verify
            npm ci --prefer-online --no-audit --no-fund
          )

      - name: Typecheck
        run: npm run typecheck

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v7

      - name: Use Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24.18.0
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Setup npm retry config
        run: |
          npm config set fetch-retries 5
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 120000

      - name: Install deps
        run: |
          npm ci --prefer-online --no-audit --no-fund || (
            sleep 5
            rm -rf node_modules
            npm cache verify
            npm ci --prefer-online --no-audit --no-fund
          )

      - name: Test
        run: npm test

  format:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v7

      - name: Use Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24.18.0
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Setup npm retry config
        run: |
          npm config set fetch-retries 5
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 120000

      - name: Install deps
        run: |
          npm ci --ignore-scripts --prefer-online --no-audit --no-fund || (
            sleep 5
            rm -rf node_modules
            npm cache verify
            npm ci --ignore-scripts --prefer-online --no-audit --no-fund
          )

      - name: Prettier check
        run: npx --no-install prettier --ignore-path ../.prettierignore --check ..

  build:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/hospitalinsights_ci
      NEXTAUTH_SECRET: ci-build-secret
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v7

      - name: Use Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24.18.0
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Setup npm retry config
        run: |
          npm config set fetch-retries 5
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 120000

      - name: Install deps
        run: |
          npm ci --prefer-online --no-audit --no-fund || (
            sleep 5
            rm -rf node_modules
            npm cache verify
            npm ci --prefer-online --no-audit --no-fund
          )

      - name: Build
        run: npm run build
