services:
  db:
    image: postgres:16
    container_name: hospitalinsights-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hospitalinsights}
      POSTGRES_USER: ${POSTGRES_USER:-hospitalinsights}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hospitalinsights_pw}
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  metabase:
    image: metabase/metabase:v0.58.7.1
    container_name: hospitalinsights-metabase
    depends_on:
      - db
    volumes:
      - metabase_data:/metabase.db

  metabase_proxy:
    image: nginx:alpine
    container_name: hospitalinsights-metabase-proxy
    depends_on:
      - metabase
    ports:
      - "3001:80"
    volumes:
      - ./nginx.metabase.dev.conf:/etc/nginx/conf.d/default.conf:ro

  app:
    build:
      context: ../app
      dockerfile: Dockerfile.dev
    container_name: hospitalinsights-app
    depends_on:
      - db
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://hospitalinsights:hospitalinsights_pw@db:5432/hospitalinsights?schema=public}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXT_DISABLE_TURBOPACK: ${NEXT_DISABLE_TURBOPACK:-1}
      METABASE_SITE_URL: ${METABASE_SITE_URL:-http://localhost:3001}
      METABASE_EMBED_SECRET: ${METABASE_EMBED_SECRET}
      METABASE_DASHBOARD_ID: ${METABASE_DASHBOARD_ID:-1}
      METABASE_DASHBOARD_CATALOG: ${METABASE_DASHBOARD_CATALOG}
      METABASE_EMBED_HOSPITAL_PARAM: ${METABASE_EMBED_HOSPITAL_PARAM:-hospitalId}
      WATCHPACK_POLLING: ${WATCHPACK_POLLING:-true}
    volumes:
      - ../app:/app
      - app_node_modules:/app/node_modules
      - app_next_cache:/app/.next
      - app_turbo_cache:/app/.turbo
    command: npm run dev --no-turbo

volumes:
  pg_data:
  app_node_modules:
  app_next_cache:
  app_turbo_cache:
  metabase_data:
