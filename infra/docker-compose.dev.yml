services:
  db:
    image: postgres:18.4-trixie
    container_name: hospitalinsights-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hospitalinsights}
      POSTGRES_USER: ${POSTGRES_USER:-hospitalinsights}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hospitalinsights_pw}
      PGDATA: /var/lib/postgresql/data
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  metabase:
    image: metabase/metabase:v0.62.3.5
    container_name: hospitalinsights-metabase
    depends_on:
      - db
    volumes:
      - metabase_data:/metabase.db

  metabase_proxy:
    image: nginx:alpine
    container_name: hospitalinsights-metabase-proxy
    depends_on:
      - metabase
    ports:
      - "3001:80"
    volumes:
      - ./nginx.metabase.dev.conf:/etc/nginx/conf.d/default.conf:ro

  redis:
    image: redis:8.8-alpine
    container_name: hospitalinsights-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: ../web
      dockerfile: Dockerfile.dev
    container_name: hospitalinsights-app
    depends_on:
      - db
      - redis
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://hospitalinsights:hospitalinsights_pw@db:5432/hospitalinsights?schema=public}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      AUTH_RATE_LIMIT_REDIS_URL: ${AUTH_RATE_LIMIT_REDIS_URL:-redis://redis:6379}
      AUTH_RATE_LIMIT_MAX_ATTEMPTS: ${AUTH_RATE_LIMIT_MAX_ATTEMPTS:-8}
      AUTH_RATE_LIMIT_WINDOW_SECONDS: ${AUTH_RATE_LIMIT_WINDOW_SECONDS:-900}
      NEXT_DISABLE_TURBOPACK: ${NEXT_DISABLE_TURBOPACK:-1}
      SECURITY_FRAME_SRC: ${SECURITY_FRAME_SRC:-http://localhost:3001}
      METABASE_SITE_URL: ${METABASE_SITE_URL:-http://localhost:3001}
      METABASE_EMBED_SECRET: ${METABASE_EMBED_SECRET}
      METABASE_DASHBOARD_ID: ${METABASE_DASHBOARD_ID:-1}
      METABASE_DASHBOARD_CATALOG: ${METABASE_DASHBOARD_CATALOG}
      METABASE_EMBED_HOSPITAL_PARAM: ${METABASE_EMBED_HOSPITAL_PARAM:-hospitalId}
      WATCHPACK_POLLING: ${WATCHPACK_POLLING:-true}
      BACKUP_DIR: ${BACKUP_DIR:?}
      BACKUP_ENABLED: ${BACKUP_ENABLED:?}
      BACKUP_RESTORE_ENABLED: ${BACKUP_RESTORE_ENABLED:?}
      BACKUP_AUTO_DAILY: ${BACKUP_AUTO_DAILY:?}
      BACKUP_AUTO_ON_HEALTH: ${BACKUP_AUTO_ON_HEALTH:?}
    volumes:
      - ../web:/app
      - web_node_modules:/app/node_modules
      - web_next_cache:/app/.next
      - web_turbo_cache:/app/.turbo
      - db_backups:/backups
    command: sh -c "npm install && npm run dev -- --webpack"

volumes:
  pg_data:
  web_node_modules:
  web_next_cache:
  web_turbo_cache:
  metabase_data:
  db_backups:
